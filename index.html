<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Termo</title>
<style>
  :root {
    --bg: #faf6ef;
    --ink: #1a1714;
    --muted: #8a8178;
    --line: #e2dacd;
    --empty: #ffffff;
    --tile-border: #d6cdbf;
    --certo: #5b8a4a;     /* verde */
    --posicao: #d8a13a;   /* amarelo/âmbar */
    --ausente: #b3a99a;   /* cinza-areia */
    --key: #ece5da;
    --key-ink: #1a1714;
    --accent: #c2492f;
    --shadow: rgba(40,32,24,.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column;
    max-width: 480px; margin: 0 auto;
    height: 100dvh;
  }
  header {
    text-align: center;
    padding: 12px 0 6px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  header h1 {
    margin: 0;
    font-size: 30px;
    letter-spacing: .42em;
    text-indent: .42em;
    font-weight: 800;
    text-transform: uppercase;
  }
  header h1 b { color: var(--accent); }
  header p {
    margin: 2px 0 0;
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .scorebar {
    display: flex;
    justify-content: space-around;
    align-items: stretch;
    padding: 8px 4px;
    border-bottom: 1px solid var(--line);
    background: #fffdf9;
  }
  .stat { text-align: center; flex: 1; position: relative; }
  .stat + .stat::before {
    content: ""; position: absolute; left: 0; top: 14%; height: 72%;
    border-left: 1px solid var(--line);
  }
  .stat .num {
    font-size: 22px; font-weight: 800; line-height: 1;
    color: var(--ink);
  }
  .stat.streak .num { color: var(--accent); }
  .stat .num.bump { animation: bump .4s ease; }
  @keyframes bump { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }
  .stat .lbl {
    display: block; margin-top: 3px;
    font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
  }
  .stat .num .fire { font-size: 16px; }
  .reset {
    position: absolute; right: 12px; top: 14px;
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--muted);
  }
  .board-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; }
  .board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 6px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .tile {
    width: 58px; height: 58px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; text-transform: uppercase;
    background: var(--empty);
    border: 2px solid var(--tile-border);
    border-radius: 8px;
    color: var(--ink);
    transition: transform .12s, background .25s, border-color .25s, color .25s;
  }
  .tile.filled { border-color: var(--muted); animation: pop .12s ease; }
  @keyframes pop { 0%{transform:scale(.9)} 100%{transform:scale(1)} }
  .tile.flip { animation: flip .5s ease forwards; }
  @keyframes flip {
    0% { transform: rotateX(0); }
    50% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
  .tile.certo   { background: var(--certo);   border-color: var(--certo);   color:#fff; }
  .tile.posicao { background: var(--posicao); border-color: var(--posicao); color:#fff; }
  .tile.ausente { background: var(--ausente); border-color: var(--ausente); color:#fff; }
  .row.shake { animation: shake .4s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
  .keyboard { padding: 6px 4px 14px; }
  .krow { display: flex; justify-content: center; gap: 5px; margin-bottom: 6px; }
  .key {
    flex: 1; max-width: 38px; height: 50px;
    border: none; border-radius: 6px;
    background: var(--key); color: var(--key-ink);
    font-size: 15px; font-weight: 700; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 1px 2px var(--shadow);
    transition: background .25s, color .25s, transform .05s;
    display:flex; align-items:center; justify-content:center;
  }
  .key:active { transform: translateY(1px); }
  .key.wide { max-width: 62px; font-size: 12px; }
  .key.certo   { background: var(--certo);   color:#fff; }
  .key.posicao { background: var(--posicao); color:#fff; }
  .key.ausente { background: var(--ausente); color:#fff; }
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg);
    padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 10;
    box-shadow: 0 4px 14px var(--shadow);
  }
  .toast.show { opacity: 1; }
  .overlay {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(26,23,20,.55);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--bg); border-radius: 16px;
    width: 100%; max-width: 360px;
    padding: 22px 20px; box-shadow: 0 14px 40px rgba(0,0,0,.35);
    animation: rise .3s ease;
  }
  @keyframes rise { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
  .modal h2 { margin: 0 0 2px; font-size: 22px; text-align: center; letter-spacing: .04em; }
  .modal .sub { text-align: center; color: var(--muted); font-size: 13px; margin: 0 0 16px; }
  .modal .big { color: var(--accent); font-weight: 800; }
  .namerow { display: flex; gap: 8px; margin-bottom: 16px; }
  .namerow input {
    flex: 1; border: 2px solid var(--tile-border); border-radius: 8px;
    padding: 12px; font-size: 16px; background: #fff; color: var(--ink);
    text-transform: uppercase;
  }
  .namerow input:focus { outline: none; border-color: var(--accent); }
  .btn {
    border: none; border-radius: 8px; padding: 12px 16px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    background: var(--accent); color: #fff;
  }
  .btn.ghost { background: var(--key); color: var(--ink); width: 100%; margin-top: 4px; }
  .rank { list-style: none; margin: 0 0 14px; padding: 0; }
  .rank li {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 6px; border-bottom: 1px solid var(--line); font-size: 15px;
  }
  .rank li:last-child { border-bottom: none; }
  .rank .pos { width: 22px; font-weight: 800; color: var(--muted); text-align: center; }
  .rank .who { flex: 1; font-weight: 600; text-transform: uppercase; }
  .rank .pts { font-weight: 800; }
  .rank li.me { background: #fff6ee; border-radius: 8px; }
  .rank .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 12px; }
  @media (max-height: 700px) {
    .tile { width: 50px; height: 50px; font-size: 24px; }
    .key { height: 44px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tile.flip, .row.shake, .tile.filled { animation: none; }
  }
  header p a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  #loginMsg { min-height: 16px; margin: 6px 0 0; color: var(--accent); font-size: 13px; }
</style>
</head>
<body>
  <header>
    <h1>TER<b>MO</b></h1>
    <p id="subtitle">palavra do dia, sua vez</p>
    <button class="reset" id="reset" title="Nova palavra">↻</button>
  </header>

  <div class="scorebar">
    <div class="stat streak">
      <span class="num" id="streak">0</span>
      <span class="lbl">Sequência</span>
    </div>
    <div class="stat">
      <span class="num" id="best">0</span>
      <span class="lbl">Recorde</span>
    </div>
    <div class="stat">
      <span class="num" id="score">0</span>
      <span class="lbl">Pontos</span>
    </div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="keyboard" id="keyboard"></div>
  <div class="toast" id="toast"></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">Fim da sequência</h2>
      <p class="sub" id="modalSub"></p>
      <ul class="rank" id="rankList"></ul>
      <button class="btn ghost" id="playAgain">Jogar de novo</button>
      <button class="btn ghost" id="trocarBtn">Trocar jogador</button>
    </div>
  </div>

  <div class="overlay" id="loginOverlay">
    <div class="modal">
      <h2>Entrar</h2>
      <p class="sub">Digite seu nome e um PIN de 4 dígitos para competir em família. Na primeira vez, criamos seu perfil.</p>
      <div class="namerow">
        <input id="loginNome" maxlength="12" placeholder="Seu nome" autocomplete="off">
      </div>
      <div class="namerow">
        <input id="loginPin" maxlength="4" inputmode="numeric" placeholder="PIN (4 dígitos)" autocomplete="off">
        <button class="btn" id="loginBtn">Entrar</button>
      </div>
      <p class="sub" id="loginMsg"></p>
    </div>
  </div>

<script src="config.js"></script>
<script>
// ---- Banco de palavras (5 letras, sem acento; comparação ignora acentos) ----
// VALIDAS = todas as palavras aceitas como chute (de palavras.txt).
// WORDS   = respostas sorteáveis = todas as válidas, menos os palavrões abaixo.
let VALIDAS = new Set();
let WORDS = [];
const PALAVROES = new Set(["MERDA","PORRA","FODER","BUNDA","CUZAO","VADIA","PUTAS","PUTAO","CAGAR","TESAO","PENIS","CONAS","TROXA","XINGA"]);

async function carregarBancos(){
  const r = await fetch("palavras.txt", { cache: "no-store" });
  if(!r.ok) throw new Error("Falha ao carregar palavras.txt (" + r.status + ")");
  const lista = (await r.text()).split(/\r?\n/).map(s => s.trim().toUpperCase()).filter(s => s.length === 5);
  VALIDAS = new Set(lista);
  WORDS = lista.filter(w => !PALAVROES.has(w));
}

const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase();

let answer, attempts, current, gameOver;
let streak = 0, best = 0, score = 0;

// Pontos-base por tentativa do acerto (índice 0 = 1ª tentativa)
const PONTOS_TENTATIVA = [100, 80, 60, 40, 25, 10];

function updateScorebar(bump){
  const s = document.getElementById("streak");
  s.innerHTML = streak + (streak >= 3 ? ' <span class="fire">🔥</span>' : '');
  document.getElementById("best").textContent = best;
  document.getElementById("score").textContent = score;
  if(bump){
    [s, document.getElementById("score")].forEach(el=>{
      el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");
    });
  }
}

function newGame() {
  let pool = WORDS;
  if(jogador && jogador.vistas){
    const restantes = WORDS.filter(w => !jogador.vistas.has(w));
    if(restantes.length === 0){
      jogador.vistas.clear();           // já viu todas → recomeça o ciclo
      toast("Você já passou por todas as palavras! Recomeçando.");
    } else {
      pool = restantes;
    }
  }
  answer = norm(pool[Math.floor(Math.random()*pool.length)]);
  attempts = [];
  current = "";
  gameOver = false;
  buildBoard();
  buildKeyboard();
  updateScorebar(false);
}

function buildBoard() {
  const b = document.getElementById("board");
  b.innerHTML = "";
  for (let r=0;r<6;r++){
    const row=document.createElement("div"); row.className="row"; row.id="row"+r;
    for(let c=0;c<5;c++){
      const t=document.createElement("div"); t.className="tile"; t.id=`t${r}-${c}`;
      row.appendChild(t);
    }
    b.appendChild(row);
  }
}

const KEYS=[["Q","W","E","R","T","Y","U","I","O","P"],
            ["A","S","D","F","G","H","J","K","L"],
            ["ENVIAR","Z","X","C","V","B","N","M","⌫"]];

function buildKeyboard(){
  const k=document.getElementById("keyboard"); k.innerHTML="";
  KEYS.forEach(rowKeys=>{
    const kr=document.createElement("div"); kr.className="krow";
    rowKeys.forEach(key=>{
      const btn=document.createElement("button");
      btn.className="key"+(key.length>1?" wide":"");
      btn.textContent=key; btn.dataset.key=key;
      btn.onclick=()=>press(key);
      kr.appendChild(btn);
    });
    k.appendChild(kr);
  });
}

function press(key){
  if(gameOver) return;
  if(key==="ENVIAR") return submit();
  if(key==="⌫"){ current=current.slice(0,-1); render(); return; }
  if(/^[A-Z]$/.test(key) && current.length<5){ current+=key; render(); }
}

function render(){
  const r=attempts.length;
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t${r}-${c}`);
    if(!t) continue;
    if(c<current.length){ t.textContent=current[c]; t.classList.add("filled"); }
    else { t.textContent=""; t.classList.remove("filled"); }
  }
}

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),1600);
}

function evaluate(guess){
  const res=Array(5).fill("ausente");
  const ans=answer.split("");
  const used=Array(5).fill(false);
  for(let i=0;i<5;i++){ if(guess[i]===ans[i]){ res[i]="certo"; used[i]=true; } }
  for(let i=0;i<5;i++){
    if(res[i]==="certo") continue;
    for(let j=0;j<5;j++){
      if(!used[j] && guess[i]===ans[j]){ res[i]="posicao"; used[j]=true; break; }
    }
  }
  return res;
}

function submit(){
  if(current.length<5){ shake(); toast("Faltam letras"); return; }
  const guess=norm(current);
  if(!VALIDAS.has(guess)){ shake(); toast("Palavra não reconhecida"); return; }
  const r=attempts.length;
  const res=evaluate(guess);

  // animação flip + cores
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t${r}-${c}`);
    setTimeout(()=>{
      t.classList.add("flip");
      setTimeout(()=>{ t.classList.add(res[c]); },240);
    }, c*180);
  }
  // teclado
  setTimeout(()=>paintKeys(guess,res), 5*180);

  attempts.push(guess);
  current="";

  if(guess===answer){
    gameOver=true;
    streak += 1;
    if(streak > best) best = streak;
    const base = PONTOS_TENTATIVA[r] || 10;
    const mult = 1 + 0.1 * (streak - 1);        // +10% por acerto encadeado
    const ganho = Math.round(base * mult);
    score += ganho;
    marcarConcluida();   // marca a palavra como vista e atualiza o recorde
    const msgs=["Genial!","Brilhante!","Mandou bem!","Boa!","Ufa!","No limite!"];
    setTimeout(()=>{
      const seqTxt = streak >= 2 ? ` · ${streak} seguidas (x${mult.toFixed(1)})` : "";
      toast(`${msgs[r]||"Acertou!"} +${ganho} pts${seqTxt}`);
      updateScorebar(true);
    }, 5*180+300);
    setTimeout(()=>{ if(gameOver) newGame(); }, 5*180+2200);
  } else if(attempts.length===6){
    gameOver=true;
    const tinhaSeq = streak;
    const pontosDaRodada = score;
    marcarConcluida();   // perdeu: marca a palavra como vista e atualiza o recorde
    streak = 0;
    setTimeout(()=>{
      toast(`A palavra era ${answer}`);
      updateScorebar(true);
    }, 5*180+300);
    if(tinhaSeq >= 1){
      // tinha uma sequência em andamento → fim de jogo, abre ranking
      setTimeout(()=>endRun(tinhaSeq, pontosDaRodada), 5*180+1400);
    } else {
      setTimeout(()=>{ if(gameOver) newGame(); }, 5*180+2400);
    }
  }
}

function paintKeys(guess,res){
  const rank={ausente:0,posicao:1,certo:2};
  for(let i=0;i<5;i++){
    const btn=document.querySelector(`.key[data-key="${guess[i]}"]`);
    if(!btn) continue;
    const cur=["ausente","posicao","certo"].find(c=>btn.classList.contains(c));
    if(!cur || rank[res[i]]>rank[cur]){
      btn.classList.remove("ausente","posicao","certo");
      btn.classList.add(res[i]);
    }
  }
}

function shake(){
  const row=document.getElementById("row"+attempts.length);
  if(row){ row.classList.add("shake"); setTimeout(()=>row.classList.remove("shake"),400); }
}

// ---- Login + placar de recordes (Supabase, com fallback local) ----
const SB_URL = (window.SUPABASE_URL || "").replace(/\/+$/, "");
const SB_KEY = window.SUPABASE_KEY || "";
const SB_OK  = !!(SB_URL && SB_KEY);

let jogador = null;   // { nome, pin, recorde, melhor_seq, vistas:Set }
let placar  = [];     // [{ nome, recorde, melhor_seq }]

async function rpc(fn, args){
  const r = await fetch(SB_URL + "/rest/v1/rpc/" + fn, {
    method: "POST",
    headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(args)
  });
  if(!r.ok) throw new Error("Erro no servidor (" + r.status + ")");
  return r.json();
}

// fallback local (quando não há Supabase configurado)
function localDB(){ try { return JSON.parse(localStorage.getItem("termo_jogadores")) || {}; } catch(e){ return {}; } }
function salvarLocalDB(db){ try { localStorage.setItem("termo_jogadores", JSON.stringify(db)); } catch(e){} }

async function entrar(nome, pin){
  nome = (nome||"").trim().toUpperCase().slice(0,12);
  pin  = (pin||"").trim();
  if(!nome) throw new Error("Digite seu nome.");
  if(!/^\d{4}$/.test(pin)) throw new Error("O PIN deve ter 4 dígitos.");
  if(SB_OK){
    const rows = await rpc("entrar", { p_nome: nome, p_pin: pin });
    const d = Array.isArray(rows) ? rows[0] : rows;
    if(!d) throw new Error("Não foi possível entrar.");
    if(d.ok === false) throw new Error("PIN incorreto para esse nome.");
    return { nome, pin, recorde: d.recorde||0, melhor_seq: d.melhor_seq||0, vistas: new Set(d.vistas||[]) };
  }
  const db = localDB();
  if(db[nome]){ if(db[nome].pin !== pin) throw new Error("PIN incorreto para esse nome."); }
  else { db[nome] = { pin, recorde:0, melhor_seq:0, vistas:[] }; salvarLocalDB(db); }
  const j = db[nome];
  return { nome, pin, recorde:j.recorde, melhor_seq:j.melhor_seq, vistas:new Set(j.vistas) };
}

async function registrarResultado(palavra, pontos, seq){
  if(!jogador) return;
  if(SB_OK){
    try {
      const rows = await rpc("registrar", { p_nome: jogador.nome, p_pin: jogador.pin, p_pontos: pontos, p_seq: seq, p_palavra: palavra });
      const d = Array.isArray(rows) ? rows[0] : rows;
      if(d){ jogador.recorde = d.recorde; jogador.melhor_seq = d.melhor_seq; }
      return;
    } catch(e){ console.error(e); return; }
  }
  const db = localDB();
  const j = db[jogador.nome] || { pin: jogador.pin, recorde:0, melhor_seq:0, vistas:[] };
  j.recorde = Math.max(j.recorde||0, pontos);
  j.melhor_seq = Math.max(j.melhor_seq||0, seq);
  if(!j.vistas.includes(palavra)) j.vistas.push(palavra);
  db[jogador.nome] = j; salvarLocalDB(db);
  jogador.recorde = j.recorde; jogador.melhor_seq = j.melhor_seq;
}

function marcarConcluida(){
  if(!jogador) return;
  jogador.vistas.add(answer);                 // não repete essa palavra p/ este jogador
  registrarResultado(answer, score, best);    // atualiza recorde/sequência no servidor
}

async function carregarPlacar(){
  if(SB_OK){
    try {
      const r = await fetch(SB_URL + "/rest/v1/placar?select=nome,recorde,melhor_seq&order=recorde.desc&limit=50", {
        headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY }
      });
      if(r.ok){ placar = await r.json(); return; }
    } catch(e){ /* fallback */ }
  }
  const db = localDB();
  placar = Object.keys(db).map(n => ({ nome:n, recorde:db[n].recorde||0, melhor_seq:db[n].melhor_seq||0 }))
                          .sort((a,b)=>b.recorde-a.recorde);
}

function renderPlacar(){
  const ol = document.getElementById("rankList");
  if(!placar || placar.length===0){
    ol.innerHTML = `<li class="empty">Ninguém marcou pontos ainda — seja o primeiro!</li>`;
    return;
  }
  const top = [...placar].sort((a,b)=>b.recorde-a.recorde).slice(0,5);
  ol.innerHTML = top.map((e,i)=>{
    const me = (jogador && e.nome===jogador.nome) ? " me" : "";
    return `<li class="${me.trim()}">
      <span class="pos">${i+1}</span>
      <span class="who">${e.nome}</span>
      <span class="pts">${e.recorde}</span>
    </li>`;
  }).join("");
}

function endRun(seq, pontos){
  document.getElementById("modalTitle").textContent = "Fim da sequência!";
  document.getElementById("modalSub").innerHTML =
    `Você acertou <span class="big">${seq}</span> ${seq===1?"palavra":"palavras"} seguidas e somou ` +
    `<span class="big">${pontos}</span> pontos.` +
    (jogador ? `<br>Seu recorde: <span class="big">${jogador.recorde}</span> pts.` : "");
  renderPlacar();
  document.getElementById("overlay").classList.add("show");
  carregarPlacar().then(renderPlacar);
}

function startNewRun(){
  score = 0; streak = 0;
  document.getElementById("overlay").classList.remove("show");
  newGame();
}

// ----- Login (tela de entrada) -----
const LS_SESSION = "termo_sessao";

function atualizarHeader(){
  const sub = document.getElementById("subtitle");
  if(jogador){
    sub.innerHTML = `Jogando como <b>${jogador.nome}</b> · <a id="trocar">trocar</a>`;
    document.getElementById("trocar").onclick = logout;
  } else {
    sub.textContent = "palavra do dia, sua vez";
  }
}
function mostrarLogin(){
  document.getElementById("loginMsg").textContent = "";
  document.getElementById("loginPin").value = "";
  document.getElementById("loginOverlay").classList.add("show");
  setTimeout(()=>document.getElementById("loginNome").focus(), 100);
}
async function fazerLogin(nome, pin){
  const j = await entrar(nome, pin);
  jogador = j;
  try { localStorage.setItem(LS_SESSION, JSON.stringify({ nome:j.nome, pin:j.pin })); } catch(e){}
  document.getElementById("loginOverlay").classList.remove("show");
  atualizarHeader();
  carregarPlacar();
}
function logout(){
  jogador = null;
  try { localStorage.removeItem(LS_SESSION); } catch(e){}
  atualizarHeader();
  document.getElementById("overlay").classList.remove("show");
  mostrarLogin();
}

document.getElementById("loginBtn").onclick = async ()=>{
  const msg = document.getElementById("loginMsg");
  msg.textContent = "Entrando...";
  try {
    await fazerLogin(document.getElementById("loginNome").value, document.getElementById("loginPin").value);
    newGame();
  } catch(e){ msg.textContent = e.message || "Erro ao entrar."; }
};
document.getElementById("loginNome").addEventListener("keydown", e=>{ e.stopPropagation(); });
document.getElementById("loginPin").addEventListener("keydown", e=>{
  e.stopPropagation();
  if(e.key==="Enter") document.getElementById("loginBtn").click();
});

document.getElementById("playAgain").onclick = ()=> startNewRun();
document.getElementById("trocarBtn").onclick = logout;

// teclado físico
window.addEventListener("keydown",e=>{
  if(document.getElementById("overlay").classList.contains("show")) return;
  if(document.getElementById("loginOverlay").classList.contains("show")) return;
  if(e.key==="Enter") press("ENVIAR");
  else if(e.key==="Backspace") press("⌫");
  else { const k=norm(e.key); if(/^[A-Z]$/.test(k)&&k.length===1) press(k); }
});

document.getElementById("reset").onclick=()=>{
  if(!jogador){ mostrarLogin(); return; }
  newGame(); toast("Nova palavra!");
};

// Inicialização: carrega as palavras, tenta a sessão salva e pede login se preciso
(async function init(){
  try { await carregarBancos(); }
  catch(e){ console.error(e); toast("Erro ao carregar as palavras"); return; }
  atualizarHeader();
  let sess = null;
  try { sess = JSON.parse(localStorage.getItem(LS_SESSION)); } catch(e){}
  if(sess && sess.nome && sess.pin){
    try { await fazerLogin(sess.nome, sess.pin); newGame(); return; }
    catch(e){ /* sessão inválida → pede login */ }
  }
  mostrarLogin();
})();
</script>
